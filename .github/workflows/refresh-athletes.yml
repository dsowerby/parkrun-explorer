name: Refresh athlete data

on:
  schedule:
    # Sunday 6am UTC — after all parkruns globally have processed results
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Also triggerable manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Refresh athlete files
        run: |
          for f in docs/athletes/*.json; do
            id=$(basename "$f" .json)
            echo "Fetching athlete $id..."
            python fetch-athlete.py "$id"
            sleep 30
          done

      - name: Commit updated athlete files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/athletes/
          git diff --staged --quiet || git commit -m "chore: refresh athlete data [skip ci]"
          git push
